services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    healthcheck:
      test: >
        echo "try { rs.status() } catch (err) {
          rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]})
        }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      retries: 30

  api:
    build: .
    ports:
      - "8000:8000"
      - "2399:2399/udp"  # UDP ADIF listener (UDP_ENABLED=true to activate)
    depends_on:
      mongodb:
        condition: service_healthy
    env_file: .env
    environment:
      - SECRET_KEY=dev-secret-change-in-production
      - MONGODB_URI=mongodb://mongodb:27017/?replicaSet=rs0
      - MONGODB_DB=ollog
      # UDP_BIND_HOST=0.0.0.0 required inside Docker (default 127.0.0.1 blocks host access)
      # UDP_ENABLED=false by default — set to true and configure UDP_OPERATOR to activate

volumes:
  mongo-data:
