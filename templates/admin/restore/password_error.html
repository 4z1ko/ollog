<div id="restore-modal">
  <div class="modal-backdrop"></div>
  <div class="modal-box">
    <h3 class="modal-title">Confirm Restore</h3>
    <p class="modal-body">Enter your admin password to restore the database. This will overwrite all current data.</p>
    <form
      hx-post="/admin/ui/restore/confirm"
      hx-target="#restore-modal"
      hx-swap="outerHTML"
    >
      <input type="hidden" name="temp_path" value="{{ temp_path }}">
      <div id="password-error-target">
        <div class="alert alert-error" role="alert">{{ error }}</div>
      </div>
      <div class="form-group">
        <label for="restore-password">Password</label>
        <input
          id="restore-password"
          type="password"
          name="password"
          required
          autocomplete="current-password"
          class="form-control"
          placeholder="Your admin password"
        >
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-danger">Restore</button>
        <button
          type="button"
          class="btn btn-secondary"
          hx-get="/admin/ui/restore"
          hx-target="#restore-modal"
          hx-swap="outerHTML"
        >Cancel</button>
      </div>
    </form>
  </div>
</div>
