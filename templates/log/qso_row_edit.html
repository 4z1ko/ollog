<tr id="qso-{{ qso.id }}">
  <td>
    <input type="text" name="QSO_DATE" value="{{ qso.QSO_DATE or '' }}" style="width:90px">
    <input type="text" name="TIME_ON" value="{{ qso.TIME_ON or '' }}" style="width:60px">
  </td>
  <td><input type="text" name="CALL" value="{{ qso.CALL }}" style="width:80px"></td>
  <td><input type="text" name="BAND" value="{{ qso.BAND or '' }}" style="width:60px"></td>
  <td><input type="text" name="MODE" value="{{ qso.MODE or '' }}" style="width:60px"></td>
  <td><input type="text" name="FREQ" value="{{ qso.FREQ or '' }}" style="width:80px"></td>
  <td>
    <input type="text" name="RST_SENT" value="{{ qso.RST_SENT or '' }}" style="width:40px"> /
    <input type="text" name="RST_RCVD" value="{{ qso.RST_RCVD or '' }}" style="width:40px">
  </td>
  <td class="actions">
    <button class="safe"
            hx-patch="/log/qsos/{{ qso.id }}"
            hx-target="#qso-{{ qso.id }}"
            hx-swap="outerHTML"
            hx-include="closest tr">Save</button>
    <button hx-get="/log/qsos/{{ qso.id }}"
            hx-target="#qso-{{ qso.id }}"
            hx-swap="outerHTML">Cancel</button>
  </td>
</tr>
