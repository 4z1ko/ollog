{% if error %}
<div class="error-msg">{{ error }}</div>
{% elif full_token %}
<div class="alert-warning space-y-3">
  <p class="font-semibold">Copy your token now — it will not be shown again:</p>
  <code class="block font-mono text-sm break-all bg-yellow-50 dark:bg-yellow-900/20 p-2 rounded">{{ full_token }}</code>
  <div class="flex gap-3 flex-wrap">
    <button type="button" class="btn-sm"
            onclick="navigator.clipboard.writeText('{{ full_token }}')">
      Copy to clipboard
    </button>
    <button type="button" class="btn-sm"
            hx-get="/log/tokens"
            hx-target="#token-list"
            hx-swap="innerHTML">
      I've copied it — close
    </button>
  </div>
</div>
{% endif %}
