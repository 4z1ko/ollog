{% extends "base.html" %}
{% block title %}ollog - QSO Log{% endblock %}
{% block content %}
<nav>
  <h1>ollog</h1>
  <div style="display:flex;gap:1rem;align-items:center;">
    <span>Logged in as <strong>{{ callsign }}</strong></span>
    <a href="/log/">Log QSO</a>
    <a href="/log/import">Import</a>
    <a href="/log/export">Export</a>
    <a href="/log/profile">Profile</a>
    <a href="/log/logout">Logout</a>
    <span id="live-indicator" style="display:none;font-size:0.8rem;padding:0.2rem 0.5rem;border-radius:4px;background:#1e8449;color:white;font-weight:600;">LIVE</span>
  </div>
</nav>

<div class="card">
  <h2>Filters</h2>
  <form id="filter-form"
        hx-get="/log/view"
        hx-target="#log-table"
        hx-swap="innerHTML"
        hx-push-url="true">
    <label>
      Callsign
      <input type="text" name="call" value="{{ filters.call or '' }}" placeholder="W1AW" autocomplete="off" style="width:110px">
    </label>
    <label>
      Band
      <select name="band" style="padding:0.4rem 0.6rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;">
        <option value="">All</option>
        <option value="160M" {% if filters.band == '160M' %}selected{% endif %}>160M</option>
        <option value="80M"  {% if filters.band == '80M'  %}selected{% endif %}>80M</option>
        <option value="60M"  {% if filters.band == '60M'  %}selected{% endif %}>60M</option>
        <option value="40M"  {% if filters.band == '40M'  %}selected{% endif %}>40M</option>
        <option value="30M"  {% if filters.band == '30M'  %}selected{% endif %}>30M</option>
        <option value="20M"  {% if filters.band == '20M'  %}selected{% endif %}>20M</option>
        <option value="17M"  {% if filters.band == '17M'  %}selected{% endif %}>17M</option>
        <option value="15M"  {% if filters.band == '15M'  %}selected{% endif %}>15M</option>
        <option value="12M"  {% if filters.band == '12M'  %}selected{% endif %}>12M</option>
        <option value="10M"  {% if filters.band == '10M'  %}selected{% endif %}>10M</option>
        <option value="6M"   {% if filters.band == '6M'   %}selected{% endif %}>6M</option>
        <option value="2M"   {% if filters.band == '2M'   %}selected{% endif %}>2M</option>
        <option value="70CM" {% if filters.band == '70CM' %}selected{% endif %}>70CM</option>
      </select>
    </label>
    <label>
      Mode
      <select name="mode" style="padding:0.4rem 0.6rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;">
        <option value="">All</option>
        <option value="SSB"   {% if filters.mode == 'SSB'   %}selected{% endif %}>SSB</option>
        <option value="CW"    {% if filters.mode == 'CW'    %}selected{% endif %}>CW</option>
        <option value="FT8"   {% if filters.mode == 'FT8'   %}selected{% endif %}>FT8</option>
        <option value="FT4"   {% if filters.mode == 'FT4'   %}selected{% endif %}>FT4</option>
        <option value="FM"    {% if filters.mode == 'FM'    %}selected{% endif %}>FM</option>
        <option value="AM"    {% if filters.mode == 'AM'    %}selected{% endif %}>AM</option>
        <option value="RTTY"  {% if filters.mode == 'RTTY'  %}selected{% endif %}>RTTY</option>
        <option value="PSK31" {% if filters.mode == 'PSK31' %}selected{% endif %}>PSK31</option>
        <option value="JS8"   {% if filters.mode == 'JS8'   %}selected{% endif %}>JS8</option>
        <option value="DSTAR" {% if filters.mode == 'DSTAR' %}selected{% endif %}>DSTAR</option>
      </select>
    </label>
    <label>
      Date From
      <input type="text" name="date_from" value="{{ filters.date_from or '' }}" placeholder="YYYYMMDD" autocomplete="off" style="width:100px">
    </label>
    <label>
      Date To
      <input type="text" name="date_to" value="{{ filters.date_to or '' }}" placeholder="YYYYMMDD" autocomplete="off" style="width:100px">
    </label>
    <input type="hidden" name="sort" value="{{ sort }}">
    <button type="submit">Filter</button>
    <button type="button"
            hx-get="/log/view"
            hx-target="#log-table"
            hx-swap="innerHTML"
            hx-push-url="true"
            hx-params="none"
            onclick="document.querySelectorAll('#filter-form input[type=text]').forEach(i=>i.value='');document.querySelectorAll('#filter-form select').forEach(s=>s.value='');">Clear</button>
  </form>
</div>

<div id="log-table"
     hx-ext="sse"
     sse-connect="/feed/station">
  {% include "log/log_table.html" %}
</div>
<script>
  (function() {
    var indicator = document.getElementById('live-indicator');

    // LIVE-05: Show LIVE indicator when SSE connection opens
    document.body.addEventListener('htmx:sseOpen', function(e) {
      if (e.detail.elt && e.detail.elt.id === 'log-table') {
        indicator.style.background = '#1e8449';
        indicator.textContent = 'LIVE';
        indicator.style.display = '';
      }
    });

    // LIVE-05: Show OFFLINE indicator on SSE error
    document.body.addEventListener('htmx:sseError', function(e) {
      if (e.detail.elt && e.detail.elt.id === 'log-table') {
        indicator.style.background = '#c0392b';
        indicator.textContent = 'OFFLINE';
        indicator.style.display = '';
      }
    });

    // LIVE-05: Hide indicator when SSE connection closes
    document.body.addEventListener('htmx:sseClose', function(e) {
      if (e.detail.elt && e.detail.elt.id === 'log-table') {
        indicator.style.display = 'none';
      }
    });

    // LIVE-01/02/03/04: Conditional refresh on new_qso SSE event
    document.body.addEventListener('htmx:sseMessage', function(e) {
      // Only respond to new_qso events on the log-table element
      if (!e.detail || !e.detail.elt || e.detail.elt.id !== 'log-table') return;
      if (e.detail.type !== 'new_qso') return;

      // LIVE-03: Server-side guard — only refresh on page 1, default sort, no filters
      if (!document.getElementById('auto-refresh-ok')) return;

      // LIVE-04: Client-side guard — do not refresh while edit row is open
      if (document.querySelector('#log-table input')) return;

      // LIVE-01/02: Trigger re-fetch of /log/view (JWT cookie sent automatically = operator isolation)
      htmx.ajax('GET', '/log/view', {target: '#log-table', swap: 'innerHTML'});
    });
  })();
</script>
{% endblock %}
