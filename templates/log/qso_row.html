<tr id="qso-{{ qso.id }}">
  {% for field in field_catalog %}
  <td data-column="{{ field.key }}">
    {% if field.key == 'call' %}
    {% if qso.flag_iso %}
    <img src="/static/flags/{{ qso.flag_iso }}.svg"
         width="20" height="15"
         alt="{{ qso.flag_country or '' }}"
         title="{{ qso.flag_country or '' }}"
         class="inline align-middle mr-1">
    {% endif %}
    {{ qso.fields.get(field.key, '') }}
    {% else %}
    {{ qso.fields.get(field.key, '') }}
    {% endif %}
  </td>
  {% endfor %}
  <td class="actions">
    <button hx-get="/log/qsos/{{ qso.id }}/edit"
            hx-target="#qso-{{ qso.id }}"
            hx-swap="outerHTML">Edit</button>
    <button class="danger"
            hx-delete="/log/qsos/{{ qso.id }}"
            hx-target="#qso-{{ qso.id }}"
            hx-swap="outerHTML"
            hx-confirm="Delete this QSO? It can be recovered by an admin.">Delete</button>
  </td>
</tr>
