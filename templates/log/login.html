{% extends "base.html" %}
{% block title %}ollog — Operator Login{% endblock %}
{% block body %}
<div class="min-h-screen bg-slate-900 flex items-center justify-center p-4"
     style="background: linear-gradient(135deg, #0f1117 0%, #1a1d2e 50%, #1e1b4b 100%);">

  <!-- Subtle grid overlay -->
  <div class="absolute inset-0 opacity-5"
       style="background-image: radial-gradient(circle, #6366f1 1px, transparent 1px); background-size: 40px 40px;"></div>

  <div class="relative w-full max-w-sm">

    <!-- Logo mark -->
    <div class="flex justify-center mb-8">
      <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-900/50">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
        </svg>
      </div>
    </div>

    <!-- Card -->
    <div class="glass-card">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-white tracking-tight">ollog</h1>
        <p class="text-slate-400 text-sm mt-1">Sign in to your operator account</p>
      </div>

      {% if error %}
      <div class="alert-error mb-6">
        <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/log/login" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
            Username
          </label>
          <input type="text" name="username" autocomplete="username" required autofocus
                 class="block w-full px-4 py-3 rounded-xl border border-white/10 bg-white/5
                        text-white placeholder-slate-500 text-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                        transition-colors duration-150">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
            Password
          </label>
          <input type="password" name="password" autocomplete="current-password" required
                 class="block w-full px-4 py-3 rounded-xl border border-white/10 bg-white/5
                        text-white placeholder-slate-500 text-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                        transition-colors duration-150">
        </div>
        <button type="submit"
                class="w-full flex items-center justify-center gap-2 px-4 py-3 mt-2
                       bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold
                       rounded-xl transition-colors duration-150
                       focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-slate-900">
          Sign in
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
          </svg>
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-600 mt-6">Amateur Radio Logging System</p>
  </div>
</div>
{% endblock %}
